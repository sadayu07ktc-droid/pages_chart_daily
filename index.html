<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>กราฟการวิ่ง/วัน — SSB</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pine:#1F7A5A; --pine-deep:#13533C; --pine-soft:#EAF3EF;
    --heavy:#1F7A5A; --light:#7FC9A4; --idle:#E9A23B; --over:#C0492F; --stop:#C3CFC9;
    --ink:#13201B; --ink-soft:#4A5B53; --ink-faint:#8A9A92;
    --surface:#fff; --line:#E2EAE6; --line-strong:#CBD8D2; --canvas:#EEF2F0; --target:#C0492F;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{overflow-x:hidden}
  body{font-family:'Noto Sans Thai',sans-serif;background:var(--canvas);color:var(--ink);padding:22px}
  .mono{font-family:'IBM Plex Mono',monospace}
  .wrap{max-width:960px;margin:0 auto;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px 24px 14px}

  .head{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
  .head h1{font-size:18px;font-weight:700}
  .head .sub{font-size:12.5px;color:var(--ink-faint);margin-top:3px}
  .head .sp{flex:1}
  .seg{display:inline-flex;background:var(--canvas);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
  .seg button{border:none;background:none;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--ink-soft);padding:6px 13px;border-radius:8px;cursor:pointer;transition:.15s}
  .seg button.on{background:var(--pine);color:#fff}

  /* KPI strip */
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin:18px 0 4px}
  .kpi{position:relative;background:linear-gradient(160deg,#fff,#FAFCFB);border:1px solid var(--line);border-radius:14px;padding:15px 16px;overflow:hidden}
  .kpi .kt{font-size:12px;color:var(--ink-faint);display:flex;align-items:center;gap:7px}
  .kpi .kt svg{width:15px;height:15px}
  .kpi .kv{font-size:28px;font-weight:700;font-family:'IBM Plex Mono',monospace;line-height:1;margin-top:9px}
  .kpi .ku{font-size:13px;color:var(--ink-soft);font-weight:600}
  .kpi .kpct{position:absolute;top:13px;right:14px;font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px}
  .pct-good{background:#E9F4EE;color:var(--pine)} .pct-mid{background:#FCF4DE;color:#B58A12} .pct-bad{background:#FBEDE9;color:var(--over)}
  .kpi .kbar{position:absolute;left:0;bottom:0;height:4px;background:var(--pine)}

  .ctrl{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:16px 0 4px}
  .pick{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink-soft)}
  .pick select,.pick input{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--line-strong);border-radius:9px;background:#fff;color:var(--ink);font-weight:600}
  #customRange{display:none;gap:8px;align-items:center}
  #sortRow{display:none;align-items:center;gap:8px;margin:10px 0 0;font-size:12.5px;color:var(--ink-soft)}
  #sortRow .seg button{padding:5px 11px;font-size:12px}

  .chart-box{position:relative;margin-top:10px;padding:18px 6px 0 46px}
  .gridline{position:absolute;left:46px;right:6px;border-top:1px dashed var(--line)}
  .ytick{position:absolute;left:0;width:40px;text-align:right;font-size:10.5px;color:var(--ink-faint);transform:translateY(-50%)}
  .target-line{position:absolute;left:46px;right:6px;border-top:2px dashed var(--target);opacity:.55}
  .target-tag{position:absolute;right:8px;transform:translateY(-50%);background:var(--target);color:#fff;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:5px}

  .bars-scroll{overflow-x:auto;overflow-y:hidden;scrollbar-width:thin;scrollbar-color:rgba(120,140,130,.35) transparent}
  .bars-scroll::-webkit-scrollbar{height:7px}
  .bars-scroll::-webkit-scrollbar-thumb{background:rgba(120,140,130,.3);border-radius:10px}
  .bars{display:flex;align-items:flex-end;gap:10px;height:300px;position:relative;z-index:2;min-width:100%}
  .bcol{flex:1 0 auto;min-width:34px;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;cursor:pointer}
  .bcol.wide{min-width:48px}
  .stack{width:74%;max-width:42px;border-radius:6px 6px 3px 3px;overflow:hidden;display:flex;flex-direction:column-reverse;transition:filter .12s,transform .12s}
  .bcol:hover .stack{filter:brightness(1.06);transform:translateY(-2px)}
  .bcol.alert .stack{outline:2px solid var(--over);outline-offset:1px}
  .seg-h{background:var(--heavy)} .seg-l{background:var(--light)} .seg-i{background:var(--idle)} .seg-o{background:var(--over)} .seg-s{background:var(--stop)}
  .xlab{font-size:10px;color:var(--ink-faint);margin-top:8px;text-align:center;line-height:1.25;max-width:60px}
  .xlab b{display:block;color:var(--ink-soft);font-weight:600;white-space:nowrap}
  .src-pill{display:inline-block;font-size:8.5px;font-weight:700;padding:0 4px;border-radius:4px;margin-top:2px}
  .src-live{background:#E9F4EE;color:var(--pine)} .src-dtc{background:#EDEFF5;color:#5B6B8C}

  .legend{display:flex;flex-wrap:wrap;gap:14px;margin:18px 0 4px;padding-top:14px;border-top:1px solid var(--line)}
  .lg{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-soft)}
  .sw{width:13px;height:13px;border-radius:4px}

  .tip{position:fixed;z-index:50;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 18px 44px -12px rgba(15,50,38,.34);padding:13px 15px;min-width:226px;opacity:0;visibility:hidden;transition:opacity .1s;pointer-events:none}
  .tip h4{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;margin-bottom:9px}
  .tip h4 .day{margin-left:auto;font-size:11px;color:var(--ink-faint);font-weight:500}
  .tip .trow{display:flex;align-items:center;gap:8px;font-size:12px;padding:3px 0}
  .tip .trow .sw{width:10px;height:10px;border-radius:3px}
  .tip .trow .v{margin-left:auto;font-weight:700;font-family:'IBM Plex Mono',monospace}
  .tip .div{border-top:1px solid var(--line);margin:8px 0}
  .tip .big{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;color:var(--ink-soft)}
  .tip .big b{font-size:17px;color:var(--pine);font-family:'IBM Plex Mono',monospace}
  .tip .kpi2{display:flex;gap:8px;margin-top:9px}
  .tip .kc{flex:1;background:var(--canvas);border-radius:8px;padding:7px 9px;text-align:center}
  .tip .kc .kv{font-size:14px;font-weight:700;font-family:'IBM Plex Mono',monospace}
  .tip .kc .kl{font-size:9.5px;color:var(--ink-faint);margin-top:1px}
  .tip .warn{margin-top:9px;font-size:11px;color:var(--over);background:#FBEDE9;border-radius:7px;padding:6px 9px;font-weight:600}

  @media(max-width:640px){.kpis{grid-template-columns:1fr}}

  /* ── drawer (เลื่อนเข้าจากขวา เหมือนแดชคนขับ) ── */
  .scrim{position:fixed;inset:0;background:rgba(10,30,22,.4);opacity:0;visibility:hidden;transition:.22s;z-index:80}
  .scrim.show{opacity:1;visibility:visible}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:380px;max-width:92vw;background:var(--surface);
    box-shadow:-18px 0 50px -20px rgba(10,40,28,.4);transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);
    z-index:90;display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(120,140,130,.35) transparent}
  .drawer.show{transform:translateX(0)}
  .drawer::-webkit-scrollbar{width:7px}
  .drawer::-webkit-scrollbar-thumb{background:rgba(120,140,130,.3);border-radius:10px}
  .dh{background:linear-gradient(135deg,var(--pine),var(--pine-deep));color:#fff;padding:20px 22px 18px;position:relative}
  .dh .x{position:absolute;top:14px;right:16px;width:32px;height:32px;border-radius:9px;border:none;background:rgba(255,255,255,.16);color:#fff;font-size:19px;cursor:pointer;line-height:1}
  .dh .dbadge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;background:rgba(255,255,255,.16);padding:3px 10px;border-radius:20px}
  .dh .dname{font-size:19px;font-weight:700;margin-top:11px}
  .dh .dmeta{font-size:12px;color:#BFE0D2;margin-top:3px;font-family:'IBM Plex Mono',monospace}
  .dbody{padding:18px 20px 26px}
  .dsec{margin-bottom:18px}
  .dsec h3{font-size:12.5px;font-weight:700;color:var(--ink-soft);margin-bottom:11px;display:flex;align-items:center;gap:7px}
  .dbar-wrap{background:var(--canvas);border-radius:11px;padding:13px 14px}
  .dbar-track{display:flex;height:26px;border-radius:7px;overflow:hidden;background:#fff}
  .dbar-track > div{height:100%}
  .dbar-leg{display:flex;flex-wrap:wrap;gap:9px 14px;margin-top:11px}
  .dbar-leg .l{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-soft)}
  .dbar-leg .l .sw{width:10px;height:10px;border-radius:3px}
  .dbar-leg .l b{font-family:'IBM Plex Mono',monospace}
  .dmetrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .dm{background:var(--canvas);border-radius:11px;padding:12px 13px}
  .dm .v{font-size:21px;font-weight:700;font-family:'IBM Plex Mono',monospace;line-height:1}
  .dm .l{font-size:11px;color:var(--ink-faint);margin-top:4px}
  .dwarn{background:#FBEDE9;color:var(--over);border-radius:10px;padding:11px 13px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:8px}
  .dgoal{display:flex;align-items:center;justify-content:space-between;background:var(--pine-soft);border-radius:10px;padding:11px 13px;font-size:12.5px}
  .dgoal b{font-family:'IBM Plex Mono',monospace;font-size:15px}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <h1>กราฟการวิ่ง / วัน</h1>
      <div class="sub" id="sub"></div>
    </div>
    <div class="sp"></div>
    <div class="seg" id="metricSeg">
      <button class="on" data-m="dist">ระยะทาง (กม.)</button>
      <button data-m="time">เวลา (ชม.)</button>
    </div>
  </div>

  <!-- KPI strip -->
  <div class="kpis" id="kpis"></div>

  <div class="ctrl">
    <div class="pick">มุมมอง
      <select id="scope">
        <option value="fleet">ทั้งฟลีต (รวมทุกคัน)</option>
        <option value="v1">รถ 87-5212 · สมชาย</option>
        <option value="v2">รถ 87-3276 · แอน</option>
        <option value="v3">รถ 80-7472 · วิรัช</option>
      </select>
    </div>
    <div class="pick">ช่วง
      <select id="range">
        <option value="today">วันนี้</option>
        <option value="7" selected>7 วันล่าสุด</option>
        <option value="month">เดือนนี้</option>
        <option value="custom">ระบุช่วง</option>
      </select>
    </div>
    <div class="pick" id="customRange">
      <input type="date" id="from"><span style="color:var(--ink-faint)">ถึง</span><input type="date" id="to">
      <button onclick="render()" style="background:var(--pine);color:#fff;border:none;padding:7px 14px;border-radius:9px;font-family:inherit;font-weight:600;cursor:pointer">ดู</button>
    </div>
  </div>

  <div id="sortRow">
    เรียงตาม:
    <div class="seg" id="sortSeg">
      <button class="on" data-s="dist">ระยะทาง</button>
      <button data-s="problem">จอดไม่ดับ/ปัญหา</button>
      <button data-s="name">ทะเบียน</button>
    </div>
  </div>

  <div class="chart-box">
    <div id="grid"></div>
    <div class="bars-scroll"><div class="bars" id="bars"></div></div>
  </div>

  <div class="legend">
    <div class="lg"><span class="sw" style="background:var(--heavy)"></span>วิ่งบรรทุก (หนัก)</div>
    <div class="lg"><span class="sw" style="background:var(--light)"></span>วิ่งเปล่า (เบา)</div>
    <div class="lg"><span class="sw" style="background:var(--idle)"></span>จอดรถไม่ดับเครื่อง</div>
    <div class="lg"><span class="sw" style="background:var(--over)"></span>ไม่ดับเครื่องเกินเกณฑ์</div>
    <div class="lg"><span class="sw" style="background:var(--stop)"></span>จอดดับเครื่อง</div>
    <div class="lg" style="margin-left:auto;color:var(--target)"><span class="sw" style="background:var(--target);border-radius:2px;height:3px"></span>เป้าหมาย/วัน</div>
  </div>
</div>

<div class="tip" id="tip"></div>
<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"></div>

<script>
  const TARGET_DIST=320, TARGET_TIME=9*60;
  const today=new Date();
  function dlabel(off){const d=new Date(today);d.setDate(d.getDate()-off);
    return {dow:['อา','จ','อ','พ','พฤ','ศ','ส'][d.getDay()],dm:(d.getDate()+'/'+(d.getMonth()+1))};}

  function rec(r,src){
    const work=r()>0.12;
    const heavy=work?Math.round(120+r()*150):0, light=work?Math.round(70+r()*90):0;
    const idle=work?Math.round(20+r()*70):0, over=idle>40?Math.round(idle*0.4):0, stop=work?Math.round(15+r()*40):0;
    return {heavy,light,idleMin:idle,overMin:over,stopMin:stop,
      stopCount:work?Math.round(2+r()*6):0,idleCount:work?Math.round(3+r()*9):0,
      idleOverCount:over>0?Math.round(1+r()*3):0,runMin:work?Math.round(180+r()*240):0,
      ot8:r()>0.85?1:0,kmpl:work?(2.8+r()*1.4):null,src};
  }
  function gen(seed,n){let s=seed;const r=()=>(s=(s*9301+49297)%233280)/233280;
    return Array.from({length:n},(_,i)=>rec(r,i===0?'live':'dtc'));}

  const DAILY={fleet:gen(7,31),v1:gen(31,31),v2:gen(53,31),v3:gen(97,31)};
  const FLEET_TODAY=(()=>{let s=21;const r=()=>(s=(s*9301+49297)%233280)/233280;
    const names=['87-5212 สมชาย','87-3276 แอน','80-7472 วิรัช','86-5698 ประยุทธ','82-1144 ก้อง','85-9921 ดล',
                 '83-7755 มานพ','88-3010 เอก','81-6644 สุชาติ','84-2289 ป้อม','87-9080 ตูน','80-1122 บอย'];
    return names.map(nm=>({name:nm,plate:nm.split(' ')[0],...rec(r,'live')}));})();

  // ── ข้อมูลรายคัน 31 วันย้อนหลัง (ใช้คำนวณ KPI "จำนวนคันถึงเป้า" ตามเฉลี่ย กม./วัน) ──
  const FLEET_HIST=(()=>{const out={};FLEET_TODAY.forEach((v,idx)=>{out[v.plate]=gen(101+idx*13,31);});return out;})();
  // เฉลี่ย กม./วัน ของแต่ละคันในช่วง n วันล่าสุด (นับเฉพาะวันที่ออกงาน)
  function vehiclesMeetingTarget(n){
    let reached=0, total=0;
    Object.keys(FLEET_HIST).forEach(plate=>{
      const days=FLEET_HIST[plate].slice(0,n);
      const work=days.filter(d=>(d.heavy+d.light)>0);
      if(!work.length) return;       // คันที่ไม่ออกงานเลยในช่วงนี้ ไม่นับ
      total++;
      const avg=work.reduce((s,d)=>s+d.heavy+d.light,0)/work.length;
      if(avg>=TARGET_DIST) reached++;
    });
    return {reached, total};
  }

  let metric='dist',scope='fleet',rangeMode='7',sortBy='dist';
  const tip=document.getElementById('tip');

  const distTotal=d=>d.heavy+d.light;
  const timeTotal=d=>d.runMin+d.idleMin;
  const colHeight=d=>metric==='dist'?distTotal(d):timeTotal(d);
  function segs(d){
    if(metric==='dist'){
      const iK=d.idleMin*0.15,oK=d.overMin*0.15,sK=d.stopMin*0.12;
      return [['seg-h',d.heavy],['seg-l',d.light],['seg-i',iK],['seg-o',oK],['seg-s',sK]];
    }
    const tot=distTotal(d)||1;
    return [['seg-h',d.runMin*d.heavy/tot],['seg-l',d.runMin*d.light/tot],['seg-i',d.idleMin-d.overMin],['seg-o',d.overMin],['seg-s',d.stopMin]];
  }

  function buildSeries(){
    const fleetToday=(scope==='fleet'&&rangeMode==='today');
    if(fleetToday){
      let list=FLEET_TODAY.slice();
      if(sortBy==='dist') list.sort((a,b)=>colHeight(b)-colHeight(a));
      else if(sortBy==='problem') list.sort((a,b)=>(b.idleOverCount*100+b.idleMin)-(a.idleOverCount*100+a.idleMin));
      else list.sort((a,b)=>a.plate.localeCompare(b.plate));
      return {perVehicle:true, items:list.map(d=>({l1:d.plate,l2:d.name.split(' ')[1]||'',src:d.src,d}))};
    }
    let n=rangeMode==='today'?1:rangeMode==='month'?30:rangeMode==='custom'?customDays():(+rangeMode||7);
    n=Math.min(n,31);
    const arr=DAILY[scope].slice(0,n).reverse();
    return {perVehicle:false, items:arr.map((d,i)=>{const L=dlabel(n-1-i);return {l1:L.dow,l2:L.dm,src:d.src,d};})};
  }
  function customDays(){const f=document.getElementById('from').value,t=document.getElementById('to').value;
    if(!f||!t)return 7;return Math.max(1,Math.min(31,Math.round((new Date(t)-new Date(f))/86400000)+1));}

  // ── KPI: เฉลี่ย %วิ่งหนัก / เฉลี่ย กม.ต่อคัน / จำนวนคันถึงเป้า ──
  function renderKPI(series){
    const items=series.items.map(x=>x.d);
    const work=items.filter(d=>distTotal(d)>0);
    const totHeavy=work.reduce((s,d)=>s+d.heavy,0), totDist=work.reduce((s,d)=>s+distTotal(d),0);
    const pctHeavy=totDist?Math.round(totHeavy/totDist*100):0;

    // เฉลี่ย กม./คัน
    let avgPerVehicle, vehLabel;
    if(series.perVehicle){
      avgPerVehicle = work.length?Math.round(totDist/work.length):0;          // ฟลีตวันนี้: หารจำนวนคัน
      vehLabel='กม./คัน';
    }else if(scope==='fleet'){
      const VEH=12; avgPerVehicle=work.length?Math.round(totDist/work.length/VEH):0; // รวมต่อวัน ÷ วัน ÷ คัน
      vehLabel='กม./คัน·วัน';
    }else{
      avgPerVehicle=work.length?Math.round(totDist/work.length):0;            // รายคัน: เฉลี่ย/วัน
      vehLabel='กม./วัน';
    }

    // ── KPI ใบ 3: "จำนวนคัน" ที่วิ่งถึงเป้า (นับคันเสมอ) ──
    let reached, totalUnits;
    if(series.perVehicle){
      // ฟลีต+วันนี้: นับคันที่ระยะวันนี้ ≥ เป้า
      reached=items.filter(d=>distTotal(d)>=TARGET_DIST).length;
      totalUnits=items.length;
    }else if(scope==='fleet'){
      // ช่วงย้อนหลังทั้งฟลีต: นับคันที่ "เฉลี่ย กม./วัน ≥ เป้า"
      let n=rangeMode==='month'?30:rangeMode==='custom'?customDays():(+rangeMode||7);
      const vm=vehiclesMeetingTarget(Math.min(n,31));
      reached=vm.reached; totalUnits=vm.total;
    }else{
      // รายคัน: คันนี้คันเดียว — เฉลี่ย กม./วัน ถึงเป้าไหม
      reached=(avgPerVehicle>=TARGET_DIST)?1:0; totalUnits=1;
    }
    const reachPct=totalUnits?Math.round(reached/totalUnits*100):0;
    const pctClass=reachPct>=70?'pct-good':reachPct>=40?'pct-mid':'pct-bad';
    const heavyClass=pctHeavy>=55?'pct-good':pctHeavy>=40?'pct-mid':'pct-bad';

    document.getElementById('kpis').innerHTML=`
      <div class="kpi">
        <div class="kt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 17H3V7h11l4 4h3v6h-2"/><circle cx="7.5" cy="17.5" r="2"/><circle cx="17.5" cy="17.5" r="2"/></svg>%วิ่งรถหนัก (เฉลี่ย)</div>
        <span class="kpct ${heavyClass}">${pctHeavy>=55?'ดี':pctHeavy>=40?'พอใช้':'ต่ำ'}</span>
        <div class="kv">${pctHeavy}<span class="ku">%</span></div>
        <div class="kbar" style="width:${pctHeavy}%;background:var(--heavy)"></div>
      </div>
      <div class="kpi">
        <div class="kt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12h18M3 6h18M3 18h18"/></svg>เฉลี่ยระยะทาง</div>
        <div class="kv">${avgPerVehicle.toLocaleString()}<span class="ku"> ${vehLabel}</span></div>
        <div class="kbar" style="width:${Math.min(100,Math.round(avgPerVehicle/TARGET_DIST*100))}%"></div>
      </div>
      <div class="kpi">
        <div class="kt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>คันวิ่งถึงเป้า</div>
        <span class="kpct ${pctClass}">${reachPct}%</span>
        <div class="kv">${reached}<span class="ku">/${totalUnits} คัน</span></div>
        <div class="kbar" style="width:${reachPct}%;background:${reachPct>=70?'var(--pine)':reachPct>=40?'var(--idle)':'var(--over)'}"></div>
      </div>`;
  }

  function render(){
    const series=buildSeries();
    renderKPI(series);
    const items=series.items;
    const maxV=Math.max(...items.map(x=>colHeight(x.d)),metric==='dist'?TARGET_DIST:TARGET_TIME)*1.12;
    const target=metric==='dist'?TARGET_DIST:TARGET_TIME, H=300;

    const grid=document.getElementById('grid');grid.innerHTML='';
    for(let i=0;i<=4;i++){const val=Math.round(maxV*i/4),y=H-(val/maxV*H);
      grid.insertAdjacentHTML('beforeend',`<div class="gridline" style="top:${18+y}px"></div><div class="ytick" style="top:${18+y}px">${metric==='dist'?val:Math.round(val/60*10)/10}</div>`);}
    const ty=H-(target/maxV*H);
    grid.insertAdjacentHTML('beforeend',`<div class="target-line" style="top:${18+ty}px"></div><div class="target-tag" style="top:${18+ty}px">เป้า ${metric==='dist'?target+' กม.':Math.round(target/60)+' ชม.'}</div>`);

    const bars=document.getElementById('bars');bars.innerHTML='';
    items.forEach(it=>{
      const d=it.d, stackH=colHeight(d)/maxV*H;
      const inner=segs(d).map(([c,v])=>v>0?`<div class="${c}" style="height:${v/(colHeight(d)||1)*100}%"></div>`:'').join('');
      const alert=d.idleOverCount>=2||d.ot8;
      const col=document.createElement('div');
      col.className='bcol'+(alert?' alert':'')+(series.perVehicle?' wide':'');
      col.innerHTML=`<div class="stack" style="height:${stackH}px">${inner}</div>
        <div class="xlab"><b>${it.l1}</b>${it.l2}<br><span class="src-pill ${it.src==='live'?'src-live':'src-dtc'}">${it.src==='live'?'สด':'DTC'}</span></div>`;
      col.addEventListener('mousemove',e=>showTip(e,d,it,series.perVehicle));
      col.addEventListener('mouseleave',()=>{tip.style.opacity=0;tip.style.visibility='hidden';});
      col.addEventListener('click',()=>openDrawer(d,it,series.perVehicle));
      bars.appendChild(col);
    });

    const scopeTxt=scope==='fleet'?'ทั้งฟลีต':document.querySelector('#scope').selectedOptions[0].text;
    const rangeTxt={today:'วันนี้','7':'7 วันล่าสุด',month:'เดือนนี้',custom:'ช่วงที่เลือก'}[rangeMode]||'';
    document.getElementById('sub').textContent=scopeTxt+' · '+(metric==='dist'?'ระยะทาง':'เวลา')+' · '+rangeTxt+(series.perVehicle?' · แยกรายคัน':'');
    document.getElementById('sortRow').style.display=series.perVehicle?'flex':'none';
    document.getElementById('customRange').style.display=rangeMode==='custom'?'flex':'none';
  }

  function showTip(e,d,it,perV){
    const dist=distTotal(d),kmpl=d.kmpl?d.kmpl.toFixed(1):'—',pctHeavy=dist?Math.round(d.heavy/dist*100):0;
    const title=perV?(it.l1+' · '+it.l2):(it.l1+' '+it.l2);
    tip.innerHTML=`
      <h4>${title}<span class="day">${d.src==='live'?'ข้อมูลสด':'จาก DTC'}</span></h4>
      <div class="trow"><span class="sw seg-h"></span>วิ่งหนัก<span class="v">${d.heavy} กม.</span></div>
      <div class="trow"><span class="sw seg-l"></span>วิ่งเบา<span class="v">${d.light} กม.</span></div>
      <div class="trow"><span class="sw seg-i"></span>จอดไม่ดับเครื่อง<span class="v">${d.idleMin} นาที</span></div>
      <div class="trow"><span class="sw seg-o"></span>เกินเกณฑ์<span class="v">${d.idleOverCount} ครั้ง</span></div>
      <div class="trow"><span class="sw seg-s"></span>จอดดับเครื่อง<span class="v">${d.stopCount} ครั้ง</span></div>
      <div class="div"></div>
      <div class="big">ระยะรวม<b>${dist} กม.</b></div>
      <div class="kpi2">
        <div class="kc"><div class="kv">${pctHeavy}%</div><div class="kl">วิ่งหนัก</div></div>
        <div class="kc"><div class="kv">${kmpl}</div><div class="kl">กม./ลิตร</div></div>
        <div class="kc"><div class="kv">${Math.floor(d.runMin/60)}:${String(d.runMin%60).padStart(2,'0')}</div><div class="kl">วิ่งรวม</div></div>
      </div>
      ${(d.idleOverCount>=2||d.ot8)?`<div class="warn">⚠️ ${d.ot8?'ขับเกิน 8 ชม. · ':''}จอดไม่ดับเครื่องเกินเกณฑ์ ${d.idleOverCount} ครั้ง</div>`:''}`;
    tip.style.opacity=1;tip.style.visibility='visible';
    let x=e.clientX+16,y=e.clientY-10;const r=tip.getBoundingClientRect();
    if(x+r.width>window.innerWidth-10)x=e.clientX-r.width-16;
    if(y+r.height>window.innerHeight-10)y=window.innerHeight-r.height-10;
    tip.style.left=x+'px';tip.style.top=Math.max(10,y)+'px';
  }

  // ── คลิกแท่ง → drawer เลื่อนเข้าจากขวา ──
  function openDrawer(d,it,perV){
    const dist=distTotal(d), kmpl=d.kmpl?d.kmpl.toFixed(1):'—', pctHeavy=dist?Math.round(d.heavy/dist*100):0;
    const title=perV?it.l1:(it.l1+' '+it.l2), meta=perV?(it.l2+' · วันนี้'):(it.l1+' '+it.l2);
    const goalPct=Math.min(100,Math.round(dist/TARGET_DIST*100));
    const hit=dist>=TARGET_DIST;
    // สัดส่วนแถบ (ระยะ): หนัก/เบา + เวลา idle/over/stop เทียบบางๆ
    const iK=d.idleMin*0.15, oK=d.overMin*0.15, sK=d.stopMin*0.12, sum=(dist+iK+oK+sK)||1;
    const seg=(v,c)=>v>0?`<div class="${c}" style="width:${v/sum*100}%"></div>`:'';
    document.getElementById('drawer').innerHTML=`
      <div class="dh">
        <button class="x" onclick="closeDrawer()">×</button>
        <span class="dbadge">${d.src==='live'?'🟢 ข้อมูลสด':'📅 จาก DTC'}</span>
        <div class="dname">${title}</div>
        <div class="dmeta">${meta}</div>
      </div>
      <div class="dbody">
        <div class="dsec">
          <h3>🛻 สัดส่วนการใช้รถ</h3>
          <div class="dbar-wrap">
            <div class="dbar-track">
              ${seg(d.heavy,'seg-h')}${seg(d.light,'seg-l')}${seg(iK,'seg-i')}${seg(oK,'seg-o')}${seg(sK,'seg-s')}
            </div>
            <div class="dbar-leg">
              <span class="l"><span class="sw seg-h"></span>วิ่งหนัก <b>${d.heavy} กม.</b></span>
              <span class="l"><span class="sw seg-l"></span>วิ่งเบา <b>${d.light} กม.</b></span>
              <span class="l"><span class="sw seg-i"></span>จอดไม่ดับ <b>${d.idleMin} น.</b></span>
              <span class="l"><span class="sw seg-o"></span>เกินเกณฑ์ <b>${d.idleOverCount} ครั้ง</b></span>
              <span class="l"><span class="sw seg-s"></span>จอดดับ <b>${d.stopCount} ครั้ง</b></span>
            </div>
          </div>
        </div>

        <div class="dsec">
          <h3>📊 ตัวชี้วัด</h3>
          <div class="dmetrics">
            <div class="dm"><div class="v">${dist}</div><div class="l">ระยะรวม (กม.)</div></div>
            <div class="dm"><div class="v">${pctHeavy}%</div><div class="l">วิ่งรถหนัก</div></div>
            <div class="dm"><div class="v">${kmpl}</div><div class="l">กม./ลิตร</div></div>
            <div class="dm"><div class="v">${Math.floor(d.runMin/60)}:${String(d.runMin%60).padStart(2,'0')}</div><div class="l">เวลาวิ่งรวม (ชม.)</div></div>
            <div class="dm"><div class="v">${d.idleMin}</div><div class="l">จอดไม่ดับเครื่อง (นาที)</div></div>
            <div class="dm"><div class="v">${d.stopCount}</div><div class="l">จอดดับเครื่อง (ครั้ง)</div></div>
          </div>
        </div>

        <div class="dsec">
          <h3>🎯 เทียบเป้าหมาย</h3>
          <div class="dgoal">
            <span>${hit?'✅ ถึงเป้า':'⚠️ ยังไม่ถึงเป้า'} (${TARGET_DIST} กม./วัน)</span>
            <b style="color:${hit?'var(--pine)':'var(--over)'}">${goalPct}%</b>
          </div>
        </div>

        ${(d.idleOverCount>=2||d.ot8)?`<div class="dwarn">⚠️ ${d.ot8?'ขับเกิน 8 ชม. · ':''}จอดไม่ดับเครื่องเกินเกณฑ์ ${d.idleOverCount} ครั้ง</div>`:''}
      </div>`;
    document.getElementById('drawer').classList.add('show');
    document.getElementById('scrim').classList.add('show');
    tip.style.opacity=0; tip.style.visibility='hidden';
  }
  function closeDrawer(){
    document.getElementById('drawer').classList.remove('show');
    document.getElementById('scrim').classList.remove('show');
  }
  document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeDrawer(); });

  document.getElementById('metricSeg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
    document.querySelectorAll('#metricSeg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');metric=b.dataset.m;render();});
  document.getElementById('sortSeg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
    document.querySelectorAll('#sortSeg button').forEach(x=>x.classList.remove('on'));b.classList.add('on');sortBy=b.dataset.s;render();});
  document.getElementById('scope').addEventListener('change',e=>{scope=e.target.value;render();});
  document.getElementById('range').addEventListener('change',e=>{rangeMode=e.target.value;render();});
  render();
</script>
</body>
</html>
