<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>กราฟการวิ่ง/วัน — SSB</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@500;600;700&family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --pine:#1F7A5A; --pine-deep:#13533C; --pine-soft:#EAF3EF;
    --heavy:#1F7A5A; --light:#7FC9A4; --idle:#E9A23B; --over:#C0492F; --stop:#C3CFC9;
    --ink:#13201B; --ink-soft:#4A5B53; --ink-faint:#8A9A92;
    --surface:#fff; --line:#E2EAE6; --line-strong:#CBD8D2; --canvas:#EEF2F0; --target:#C0492F;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{overflow-x:hidden}
  body{font-family:'Noto Sans Thai',sans-serif;background:var(--canvas);color:var(--ink);padding:22px}
  .mono{font-family:'IBM Plex Mono',monospace}
  .wrap{max-width:960px;margin:0 auto;background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:22px 24px 14px}

  .head{display:flex;align-items:flex-start;gap:14px;flex-wrap:wrap}
  .head h1{font-size:18px;font-weight:700}
  .head .sub{font-size:12.5px;color:var(--ink-faint);margin-top:3px}
  .head .sp{flex:1}
  .seg{display:inline-flex;background:var(--canvas);border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
  .seg button{border:none;background:none;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--ink-soft);padding:6px 13px;border-radius:8px;cursor:pointer;transition:.15s}
  .seg button.on{background:var(--pine);color:#fff}

  /* KPI strip */
  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin:18px 0 4px}
  .kpi{position:relative;background:linear-gradient(160deg,#fff,#FAFCFB);border:1px solid var(--line);border-radius:14px;padding:15px 16px;overflow:hidden}
  .kpi .kt{font-size:12px;color:var(--ink-faint);display:flex;align-items:center;gap:7px}
  .kpi .kt svg{width:15px;height:15px}
  .kpi .kv{font-size:28px;font-weight:700;font-family:'IBM Plex Mono',monospace;line-height:1;margin-top:9px}
  .kpi .ku{font-size:13px;color:var(--ink-soft);font-weight:600}
  .kpi .kpct{position:absolute;top:13px;right:14px;font-size:12px;font-weight:700;padding:3px 9px;border-radius:20px}
  .pct-good{background:#E9F4EE;color:var(--pine)} .pct-mid{background:#FCF4DE;color:#B58A12} .pct-bad{background:#FBEDE9;color:var(--over)}
  .kpi .kbar{position:absolute;left:0;bottom:0;height:4px;background:var(--pine)}

  .ctrl{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin:16px 0 4px}
  .pick{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--ink-soft)}
  .pick select,.pick input{font-family:inherit;font-size:13px;padding:7px 10px;border:1px solid var(--line-strong);border-radius:9px;background:#fff;color:var(--ink);font-weight:600}
  #customRange{display:none;gap:8px;align-items:center}
  #sortRow{display:none;align-items:center;gap:8px;margin:10px 0 0;font-size:12.5px;color:var(--ink-soft)}
  #sortRow .seg button{padding:5px 11px;font-size:12px}

  .chart-box{position:relative;margin-top:10px;padding:18px 6px 0 46px}
  .gridline{position:absolute;left:46px;right:6px;border-top:1px dashed var(--line)}
  .ytick{position:absolute;left:0;width:40px;text-align:right;font-size:10.5px;color:var(--ink-faint);transform:translateY(-50%)}
  .target-line{position:absolute;left:46px;right:6px;border-top:2px dashed var(--target);opacity:.55}
  .target-tag{position:absolute;right:8px;transform:translateY(-50%);background:var(--target);color:#fff;font-size:9.5px;font-weight:700;padding:1px 6px;border-radius:5px}

  .bars-scroll{overflow-x:auto;overflow-y:hidden;scrollbar-width:thin;scrollbar-color:rgba(120,140,130,.35) transparent}
  .bars-scroll::-webkit-scrollbar{height:7px}
  .bars-scroll::-webkit-scrollbar-thumb{background:rgba(120,140,130,.3);border-radius:10px}
  .bars{display:flex;align-items:flex-end;gap:10px;height:300px;position:relative;z-index:2;min-width:100%}
  .bcol{flex:1 0 auto;min-width:34px;display:flex;flex-direction:column;align-items:center;height:100%;justify-content:flex-end;cursor:pointer}
  .bcol.wide{min-width:48px}
  .stack{width:74%;max-width:42px;border-radius:6px 6px 3px 3px;overflow:hidden;display:flex;flex-direction:column-reverse;transition:filter .12s,transform .12s}
  .bcol:hover .stack{filter:brightness(1.06);transform:translateY(-2px)}
  .bcol.alert .stack{outline:2px solid var(--over);outline-offset:1px}
  .seg-h{background:var(--heavy)} .seg-l{background:var(--light)} .seg-i{background:var(--idle)} .seg-o{background:var(--over)} .seg-s{background:var(--stop)}
  .xlab{font-size:10px;color:var(--ink-faint);margin-top:8px;text-align:center;line-height:1.25;max-width:60px}
  .xlab b{display:block;color:var(--ink-soft);font-weight:600;white-space:nowrap}
  .src-pill{display:inline-block;font-size:8.5px;font-weight:700;padding:0 4px;border-radius:4px;margin-top:2px}
  .src-live{background:#E9F4EE;color:var(--pine)} .src-dtc{background:#EDEFF5;color:#5B6B8C} .src-sheet{background:#EAF3EF;color:var(--pine-deep)}

  .legend{display:flex;flex-wrap:wrap;gap:14px;margin:18px 0 4px;padding-top:14px;border-top:1px solid var(--line)}
  .lg{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--ink-soft)}
  .sw{width:13px;height:13px;border-radius:4px}

  .tip{position:fixed;z-index:50;background:#fff;border:1px solid var(--line);border-radius:12px;box-shadow:0 18px 44px -12px rgba(15,50,38,.34);padding:13px 15px;min-width:226px;opacity:0;visibility:hidden;transition:opacity .1s;pointer-events:none}
  .tip h4{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px;margin-bottom:9px}
  .tip h4 .day{margin-left:auto;font-size:11px;color:var(--ink-faint);font-weight:500}
  .tip .trow{display:flex;align-items:center;gap:8px;font-size:12px;padding:3px 0}
  .tip .trow .sw{width:10px;height:10px;border-radius:3px}
  .tip .trow .v{margin-left:auto;font-weight:700;font-family:'IBM Plex Mono',monospace}
  .tip .div{border-top:1px solid var(--line);margin:8px 0}
  .tip .big{display:flex;justify-content:space-between;align-items:baseline;font-size:12px;color:var(--ink-soft)}
  .tip .big b{font-size:17px;color:var(--pine);font-family:'IBM Plex Mono',monospace}
  .tip .kpi2{display:flex;gap:8px;margin-top:9px}
  .tip .kc{flex:1;background:var(--canvas);border-radius:8px;padding:7px 9px;text-align:center}
  .tip .kc .kv{font-size:14px;font-weight:700;font-family:'IBM Plex Mono',monospace}
  .tip .kc .kl{font-size:9.5px;color:var(--ink-faint);margin-top:1px}
  .tip .warn{margin-top:9px;font-size:11px;color:var(--over);background:#FBEDE9;border-radius:7px;padding:6px 9px;font-weight:600}

  @media(max-width:640px){.kpis{grid-template-columns:1fr}}

  /* ── drawer (เลื่อนเข้าจากขวา เหมือนแดชคนขับ) ── */
  .scrim{position:fixed;inset:0;background:rgba(10,30,22,.4);opacity:0;visibility:hidden;transition:.22s;z-index:80}
  .scrim.show{opacity:1;visibility:visible}
  .drawer{position:fixed;top:0;right:0;height:100vh;width:380px;max-width:92vw;background:var(--surface);
    box-shadow:-18px 0 50px -20px rgba(10,40,28,.4);transform:translateX(100%);transition:transform .26s cubic-bezier(.4,0,.2,1);
    z-index:90;display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(120,140,130,.35) transparent}
  .drawer.show{transform:translateX(0)}
  .drawer::-webkit-scrollbar{width:7px}
  .drawer::-webkit-scrollbar-thumb{background:rgba(120,140,130,.3);border-radius:10px}
  .dh{background:linear-gradient(135deg,var(--pine),var(--pine-deep));color:#fff;padding:20px 22px 18px;position:relative}
  .dh .x{position:absolute;top:14px;right:16px;width:32px;height:32px;border-radius:9px;border:none;background:rgba(255,255,255,.16);color:#fff;font-size:19px;cursor:pointer;line-height:1}
  .dh .dbadge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:600;background:rgba(255,255,255,.16);padding:3px 10px;border-radius:20px}
  .dh .dname{font-size:19px;font-weight:700;margin-top:11px}
  .dh .dmeta{font-size:12px;color:#BFE0D2;margin-top:3px;font-family:'IBM Plex Mono',monospace}
  .dbody{padding:18px 20px 26px}
  .dsec{margin-bottom:18px}
  .dsec h3{font-size:12.5px;font-weight:700;color:var(--ink-soft);margin-bottom:11px;display:flex;align-items:center;gap:7px}
  .dbar-wrap{background:var(--canvas);border-radius:11px;padding:13px 14px}
  .dbar-track{display:flex;height:26px;border-radius:7px;overflow:hidden;background:#fff}
  .dbar-track > div{height:100%}
  .dbar-leg{display:flex;flex-wrap:wrap;gap:9px 14px;margin-top:11px}
  .dbar-leg .l{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-soft)}
  .dbar-leg .l .sw{width:10px;height:10px;border-radius:3px}
  .dbar-leg .l b{font-family:'IBM Plex Mono',monospace}
  .dmetrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .dm{background:var(--canvas);border-radius:11px;padding:12px 13px}
  .dm .v{font-size:21px;font-weight:700;font-family:'IBM Plex Mono',monospace;line-height:1}
  .dm .l{font-size:11px;color:var(--ink-faint);margin-top:4px}
  .dwarn{background:#FBEDE9;color:var(--over);border-radius:10px;padding:11px 13px;font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:8px}
  .dgoal{display:flex;align-items:center;justify-content:space-between;background:var(--pine-soft);border-radius:10px;padding:11px 13px;font-size:12.5px}
  .dgoal b{font-family:'IBM Plex Mono',monospace;font-size:15px}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <h1>กราฟสถานะรถวันนี้ / DTC</h1>
      <div class="sub" id="sub">กำลังโหลดข้อมูลจริงจากระบบ...</div>
    </div>
    <div class="sp"></div>
    <div class="seg" id="metricSeg">
      <button class="on" data-m="time">เวลา (ชม.)</button>
    </div>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="ctrl">
    <div class="pick">มุมมอง
      <select id="scope">
        <option value="fleet">ทั้งฟลีต (รวมทุกคัน)</option>
      </select>
    </div>
    <div class="pick">ข้อมูล
      <select id="range">
        <option value="today" selected>วันนี้</option>
      </select>
    </div>
  </div>

  <div id="sortRow" style="display:flex">
    เรียงตาม:
    <div class="seg" id="sortSeg">
      <button class="on" data-s="time">เวลารวม</button>
      <button data-s="run">เวลาวิ่ง</button>
      <button data-s="park">จอดดับเครื่อง</button>
      <button data-s="problem">จอดไม่ดับ/ปัญหา</button>
      <button data-s="name">ทะเบียน</button>
    </div>
  </div>

  <div class="chart-box">
    <div id="grid"></div>
    <div class="bars-scroll"><div class="bars" id="bars"></div></div>
  </div>

  <div class="legend">
    <div class="lg"><span class="sw" style="background:var(--heavy)"></span>เวลาวิ่ง</div>
    <div class="lg"><span class="sw" style="background:var(--idle)"></span>จอดรถไม่ดับเครื่อง</div>
    <div class="lg"><span class="sw" style="background:var(--stop)"></span>จอดรถดับเครื่อง</div>
    <div class="lg"><span class="sw" style="background:var(--over)"></span>ไม่ดับเครื่องเกินเกณฑ์</div>
    <div class="lg" style="margin-left:auto;color:var(--target)"><span class="sw" style="background:var(--target);border-radius:2px;height:3px"></span>เป้าหมายเวลาวิ่ง/วัน</div>
  </div>
</div>

<div class="tip" id="tip"></div>
<div class="scrim" id="scrim" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer"></div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbw4UvKuRrAQ_3Ldm8U0VJqfjfBQUSYaTEdrxkdXUVN98G68XseCquhDeXfMgU8cVYaY/exec';
  const TARGET_TIME = 9 * 60;

  let metric = 'time';
  let scope = 'fleet';
  let sortBy = 'time';

  let API_ITEMS = [];
  let API_VEHICLES = [];
  let API_SOURCE = '';
  let API_DATE = '';
  let API_UPDATED = '';
  let API_SUMMARY = {};
  let API_ERROR = '';
  let API_LOADING = false;

  const tip = document.getElementById('tip');

  function num(n){
    n = Number(n || 0);
    return isFinite(n) ? n : 0;
  }

  function fmtMin(m){
    m = Math.round(num(m));
    return Math.floor(m / 60) + ':' + String(m % 60).padStart(2,'0');
  }

  function fmtHour(m){
    return (num(m) / 60).toFixed(1);
  }

  function fmtDateTime(iso){
    if(!iso) return '';
    const d = new Date(iso);
    if(isNaN(d)) return '';
    return d.toLocaleString('th-TH', { hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit' });
  }

  function totalTime(d){
    return num(d.runMin) + num(d.idleMin) + num(d.parkMin);
  }

  function colHeight(d){
    return totalTime(d);
  }

  function stateText(s){
    s = String(s || '').toLowerCase();
    if(s === 'run') return 'กำลังวิ่ง';
    if(s === 'idling') return 'จอดไม่ดับเครื่อง';
    if(s === 'park') return 'จอดรถดับเครื่อง';
    if(s === 'off') return 'GPS ออฟไลน์';
    return s || '—';
  }

  function stateBadge(s){
    s = String(s || '').toLowerCase();
    if(s === 'run') return '🟢 กำลังวิ่ง';
    if(s === 'idling') return '🟠 จอดไม่ดับเครื่อง';
    if(s === 'park') return '🔵 จอดดับเครื่อง';
    if(s === 'off') return '🔴 GPS ออฟไลน์';
    return '⚪ ' + (s || 'ไม่ทราบสถานะ');
  }

  function normalizeDtcToday(j) {
    const items = (j.items || []).map(x => {
      const runMin = num(x.runMin);
      const idleMin = num(x.idleMin);
      const parkMin = num(x.parkMin);
      return {
        date: x.date || j.date || '',
        driverId: x.driverId || '',
        name: x.name || x.driverId || '',
        plate: x.plate || '',
        plates: x.plates || x.plate || '',
        vehicleType: x.vehicleType || '',
        gpsState: x.gpsState || '',
        runMin,
        idleMin,
        parkMin,
        idleCount: num(x.idleCount),
        idleOverCount: num(x.idleOverCount),
        stopCount: num(x.stopCount),
        overtime4: num(x.overtime4),
        overtime8: num(x.overtime8),
        totalTimeMin: runMin + idleMin + parkMin,
        src: x.src || 'live'
      };
    });

    return {
      ok: true,
      source: j.source || 'LOG_DailyCount',
      mode: j.mode || 'today',
      date: j.date || '',
      updatedAt: j.updatedAt || '',
      summary: j.summary || {},
      items
    };
  }

  function syncScopeOptions(){
    const sel = document.getElementById('scope');
    const old = scope || sel.value || 'fleet';
    const vehicles = Array.from(new Set(API_VEHICLES.filter(Boolean))).sort();

    sel.innerHTML = '<option value="fleet">ทั้งฟลีต (รวมทุกคัน)</option>' +
      vehicles.map(p => `<option value="${p}">รถ ${p}</option>`).join('');

    const exists = Array.from(sel.options).some(o => o.value === old);
    sel.value = exists ? old : 'fleet';
    scope = sel.value;
  }

  async function loadDailyRunChart(){
    API_LOADING = true;
    API_ERROR = '';
    render();

    try{
      const isFleet = scope === 'fleet';
      const url = GAS_URL
        + '?action=getDtcTodayChart'
        + '&scope=' + encodeURIComponent(isFleet ? 'fleet' : 'plate')
        + (isFleet ? '' : '&plate=' + encodeURIComponent(scope))
        + '&t=' + Date.now();

      const r = await fetch(url, { cache:'no-store' });
      const text = await r.text();

      let j;
      try{
        j = JSON.parse(text);
      }catch(e){
        throw new Error('API ไม่ได้ตอบ JSON: ' + text.slice(0, 180));
      }

      if(!j || !j.ok){
        throw new Error((j && j.error) || 'โหลดข้อมูลไม่สำเร็จ');
      }

      const dtc = normalizeDtcToday(j);
      API_ITEMS = dtc.items || [];
      API_VEHICLES = Array.from(new Set(API_ITEMS.map(x => x.plate).filter(Boolean)));
      API_SOURCE = dtc.source || '';
      API_DATE = dtc.date || '';
      API_UPDATED = dtc.updatedAt || '';
      API_SUMMARY = dtc.summary || {};
      syncScopeOptions();

    }catch(e){
      console.error('loadDailyRunChart error', e);
      API_ITEMS = [];
      API_ERROR = e && e.message ? e.message : String(e);
    }

    API_LOADING = false;
    render();
  }

  function toChartItem(x){
    return {
      l1: x.plate || x.driverId || '—',
      l2: x.name || '',
      src: x.src || 'live',
      d: {
        date: x.date || '',
        driverId: x.driverId || '',
        plate: x.plate || '',
        plates: x.plates || '',
        driverName: x.name || '',
        vehicleType: x.vehicleType || '',
        gpsState: x.gpsState || '',
        runMin: num(x.runMin),
        idleMin: num(x.idleMin),
        parkMin: num(x.parkMin),
        idleCount: num(x.idleCount),
        idleOverCount: num(x.idleOverCount),
        stopCount: num(x.stopCount),
        overtime4: num(x.overtime4),
        overtime8: num(x.overtime8),
        src: x.src || 'live'
      }
    };
  }

  function buildSeries(){
    let items = API_ITEMS.map(toChartItem);

    if(sortBy === 'run'){
      items.sort((a,b)=>num(b.d.runMin)-num(a.d.runMin));
    }else if(sortBy === 'park'){
      items.sort((a,b)=>num(b.d.parkMin)-num(a.d.parkMin));
    }else if(sortBy === 'problem'){
      items.sort((a,b)=>(num(b.d.idleOverCount)*1000 + num(b.d.idleMin)) - (num(a.d.idleOverCount)*1000 + num(a.d.idleMin)));
    }else if(sortBy === 'name'){
      items.sort((a,b)=>String(a.d.plate).localeCompare(String(b.d.plate), 'th'));
    }else{
      items.sort((a,b)=>totalTime(b.d)-totalTime(a.d));
    }

    return { perVehicle:true, items };
  }

  function segs(d){
    return [
      ['seg-h', num(d.runMin)],
      ['seg-i', num(d.idleMin)],
      ['seg-s', num(d.parkMin)]
    ];
  }

  function renderKPI(series){
    const items = series.items.map(x => x.d);
    const totalRun = items.reduce((s,d)=>s+num(d.runMin),0);
    const totalIdle = items.reduce((s,d)=>s+num(d.idleMin),0);
    const totalPark = items.reduce((s,d)=>s+num(d.parkMin),0);
    const totalStop = items.reduce((s,d)=>s+num(d.stopCount),0);
    const totalIdleOver = items.reduce((s,d)=>s+num(d.idleOverCount),0);
    const runningVehicles = items.filter(d => num(d.runMin) > 0).length;
    const totalVehicles = items.length || 0;
    const runPct = totalVehicles ? Math.round(runningVehicles / totalVehicles * 100) : 0;

    document.getElementById('kpis').innerHTML = `
      <div class="kpi">
        <div class="kt">🟢 เวลาวิ่งรวม</div>
        <span class="kpct pct-good">${runningVehicles}/${totalVehicles} คัน</span>
        <div class="kv">${fmtMin(totalRun)}<span class="ku"> ชม.</span></div>
        <div class="kbar" style="width:${Math.min(100, runPct)}%;background:var(--heavy)"></div>
      </div>
      <div class="kpi">
        <div class="kt">🔵 จอดรถดับเครื่องรวม</div>
        <span class="kpct ${totalPark > totalRun ? 'pct-mid' : 'pct-good'}">${Math.round(totalPark)} นาที</span>
        <div class="kv">${fmtMin(totalPark)}<span class="ku"> ชม.</span></div>
        <div class="kbar" style="width:${Math.min(100, totalRun ? Math.round(totalPark / totalRun * 100) : 100)}%;background:var(--stop)"></div>
      </div>
      <div class="kpi">
        <div class="kt">🟠 จอดไม่ดับ / เกินเกณฑ์</div>
        <span class="kpct ${totalIdleOver > 0 ? 'pct-bad' : 'pct-good'}">${totalIdleOver} ครั้ง</span>
        <div class="kv">${fmtMin(totalIdle)}<span class="ku"> ชม.</span></div>
        <div class="kbar" style="width:${Math.min(100, totalIdle)}%;background:${totalIdleOver > 0 ? 'var(--over)' : 'var(--idle)'}"></div>
      </div>`;
  }

  function render(){
    const series = buildSeries();
    renderKPI(series);
    const items = series.items;
    const H = 300;
    const maxV = Math.max(...items.map(x => colHeight(x.d)), TARGET_TIME) * 1.12;
    const target = TARGET_TIME;

    const grid = document.getElementById('grid');
    grid.innerHTML = '';
    for(let i=0; i<=4; i++){
      const val = Math.round(maxV * i / 4);
      const y = H - (val / maxV * H);
      grid.insertAdjacentHTML('beforeend',
        `<div class="gridline" style="top:${18+y}px"></div>
         <div class="ytick" style="top:${18+y}px">${Math.round(val/60*10)/10}</div>`);
    }

    const ty = H - (target / maxV * H);
    grid.insertAdjacentHTML('beforeend',
      `<div class="target-line" style="top:${18+ty}px"></div>
       <div class="target-tag" style="top:${18+ty}px">เป้า ${Math.round(target/60)} ชม.</div>`);

    const bars = document.getElementById('bars');
    bars.innerHTML = '';

    if(API_LOADING){
      bars.innerHTML = '<div style="height:300px;width:100%;display:grid;place-items:center;color:var(--ink-faint);font-size:13px">กำลังโหลดข้อมูล DTC วันนี้...</div>';
    }else if(API_ERROR){
      bars.innerHTML = `<div style="height:300px;width:100%;display:grid;place-items:center;color:var(--over);font-size:13px;text-align:center;line-height:1.7">โหลดข้อมูลไม่สำเร็จ<br>${API_ERROR}</div>`;
    }else if(!items.length){
      bars.innerHTML = '<div style="height:300px;width:100%;display:grid;place-items:center;color:var(--ink-faint);font-size:13px;text-align:center;line-height:1.7">ยังไม่มีข้อมูลวันนี้<br>เช็ก LOG_DailyCount / pollGpsState</div>';
    }else{
      items.forEach(it => {
        const d = it.d;
        const total = colHeight(d);
        const stackH = total / maxV * H;
        const inner = segs(d).map(([c,v]) => v > 0 ? `<div class="${c}" style="height:${v/(total||1)*100}%"></div>` : '').join('');
        const alert = num(d.idleOverCount) > 0 || num(d.overtime8) > 0;
        const col = document.createElement('div');
        col.className = 'bcol wide' + (alert ? ' alert' : '');
        col.innerHTML = `<div class="stack" style="height:${Math.max(2, stackH)}px">${inner}</div>
          <div class="xlab"><b>${it.l1}</b>${it.l2 ? '<br>' + it.l2 : ''}<br><span class="src-pill src-live">${stateText(d.gpsState)}</span></div>`;
        col.addEventListener('mousemove', e => showTip(e, d, it));
        col.addEventListener('mouseleave', () => { tip.style.opacity = 0; tip.style.visibility = 'hidden'; });
        col.addEventListener('click', () => openDrawer(d, it));
        bars.appendChild(col);
      });
    }

    const scopeTxt = scope === 'fleet' ? 'ทั้งฟลีต' : ('รถ ' + scope);
    const updated = API_UPDATED ? ' · อัปเดต ' + fmtDateTime(API_UPDATED) : '';
    const srcTxt = API_SOURCE ? ' · ' + API_SOURCE : '';
    document.getElementById('sub').textContent = scopeTxt + ' · วันนี้ · เวลาใช้งานจาก DTC' + srcTxt + updated;
  }

  function showTip(e, d, it){
    const total = totalTime(d);
    const title = (d.plate ? d.plate + ' · ' : '') + (d.driverName || it.l2 || d.driverId);
    tip.innerHTML = `
      <h4>${title}<span class="day">${stateBadge(d.gpsState)}</span></h4>
      <div class="trow"><span class="sw seg-h"></span>เวลาวิ่ง<span class="v">${fmtMin(d.runMin)} ชม.</span></div>
      <div class="trow"><span class="sw seg-i"></span>จอดรถไม่ดับเครื่อง<span class="v">${fmtMin(d.idleMin)} ชม.</span></div>
      <div class="trow"><span class="sw seg-s"></span>จอดรถดับเครื่อง<span class="v">${fmtMin(d.parkMin)} ชม.</span></div>
      <div class="div"></div>
      <div class="big">เวลารวมวันนี้<b>${fmtMin(total)} ชม.</b></div>
      <div class="kpi2">
        <div class="kc"><div class="kv">${num(d.idleCount)}</div><div class="kl">ครั้งจอดไม่ดับ</div></div>
        <div class="kc"><div class="kv">${num(d.idleOverCount)}</div><div class="kl">เกินเกณฑ์</div></div>
        <div class="kc"><div class="kv">${num(d.stopCount)}</div><div class="kl">ครั้งจอดดับ</div></div>
      </div>
      ${(num(d.idleOverCount)>0 || num(d.overtime8)>0) ? `<div class="warn">⚠️ ${num(d.overtime8)>0?'ขับเกิน 8 ชม. · ':''}จอดรถไม่ดับเครื่องเกินเกณฑ์ ${num(d.idleOverCount)} ครั้ง</div>` : ''}`;
    tip.style.opacity = 1;
    tip.style.visibility = 'visible';
    let x = e.clientX + 16, y = e.clientY - 10;
    const r = tip.getBoundingClientRect();
    if(x + r.width > window.innerWidth - 10) x = e.clientX - r.width - 16;
    if(y + r.height > window.innerHeight - 10) y = window.innerHeight - r.height - 10;
    tip.style.left = x + 'px';
    tip.style.top = Math.max(10, y) + 'px';
  }

  function openDrawer(d, it){
    const total = totalTime(d);
    const title = (d.plate ? d.plate + ' · ' : '') + (d.driverName || it.l2 || d.driverId);
    const sum = total || 1;
    const seg = (v,c) => v > 0 ? `<div class="${c}" style="width:${v/sum*100}%"></div>` : '';

    document.getElementById('drawer').innerHTML = `
      <div class="dh">
        <button class="x" onclick="closeDrawer()">×</button>
        <span class="dbadge">${stateBadge(d.gpsState)}</span>
        <div class="dname">${title}</div>
        <div class="dmeta">${d.driverId || ''} · ${d.vehicleType || ''} · ${d.date || API_DATE || ''}</div>
      </div>
      <div class="dbody">
        <div class="dsec">
          <h3>📊 สัดส่วนเวลาวันนี้</h3>
          <div class="dbar-wrap">
            <div class="dbar-track">${seg(num(d.runMin),'seg-h')}${seg(num(d.idleMin),'seg-i')}${seg(num(d.parkMin),'seg-s')}</div>
            <div class="dbar-leg">
              <span class="l"><span class="sw seg-h"></span>เวลาวิ่ง <b>${fmtMin(d.runMin)} ชม.</b></span>
              <span class="l"><span class="sw seg-i"></span>จอดไม่ดับ <b>${fmtMin(d.idleMin)} ชม.</b></span>
              <span class="l"><span class="sw seg-s"></span>จอดดับ <b>${fmtMin(d.parkMin)} ชม.</b></span>
            </div>
          </div>
        </div>

        <div class="dsec">
          <h3>🧾 รายละเอียด</h3>
          <div class="dmetrics">
            <div class="dm"><div class="v">${fmtMin(total)}</div><div class="l">เวลารวมวันนี้ (ชม.)</div></div>
            <div class="dm"><div class="v">${fmtMin(d.runMin)}</div><div class="l">เวลาวิ่ง (ชม.)</div></div>
            <div class="dm"><div class="v">${fmtMin(d.idleMin)}</div><div class="l">จอดรถไม่ดับเครื่อง</div></div>
            <div class="dm"><div class="v">${fmtMin(d.parkMin)}</div><div class="l">จอดรถดับเครื่อง</div></div>
            <div class="dm"><div class="v">${num(d.idleCount)}</div><div class="l">จำนวนครั้งจอดไม่ดับ</div></div>
            <div class="dm"><div class="v">${num(d.stopCount)}</div><div class="l">จำนวนครั้งจอดดับ</div></div>
            <div class="dm"><div class="v">${num(d.idleOverCount)}</div><div class="l">ไม่ดับเครื่องเกินเกณฑ์</div></div>
            <div class="dm"><div class="v">${num(d.overtime8)}</div><div class="l">ขับเกิน 8 ชม.</div></div>
          </div>
        </div>

        ${(num(d.idleOverCount)>0 || num(d.overtime8)>0) ? `<div class="dwarn">⚠️ ${num(d.overtime8)>0?'ขับเกิน 8 ชม. · ':''}จอดรถไม่ดับเครื่องเกินเกณฑ์ ${num(d.idleOverCount)} ครั้ง</div>` : ''}
      </div>`;
    document.getElementById('drawer').classList.add('show');
    document.getElementById('scrim').classList.add('show');
    tip.style.opacity = 0;
    tip.style.visibility = 'hidden';
  }

  function closeDrawer(){
    document.getElementById('drawer').classList.remove('show');
    document.getElementById('scrim').classList.remove('show');
  }

  async function reloadAndRender(){
    await loadDailyRunChart();
  }

  document.addEventListener('keydown', e => { if(e.key === 'Escape') closeDrawer(); });

  document.getElementById('sortSeg').addEventListener('click', e => {
    const b = e.target.closest('button'); if(!b) return;
    document.querySelectorAll('#sortSeg button').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    sortBy = b.dataset.s;
    render();
  });

  document.getElementById('scope').addEventListener('change', e => {
    scope = e.target.value;
    reloadAndRender();
  });

  // Auto-refresh ทุก 2 นาที ให้ทัน pollGpsState
  reloadAndRender();
  setInterval(reloadAndRender, 120000);
</script>
</body>
</html>
